# Codemagic — build do AAB do SDX-Prontus (Expo managed) sem usar a cota do EAS.
# Faz: npm ci → expo prebuild (gera android/) → gradle bundleRelease assinado.
#
# Pré-requisitos (configurados na UI do Codemagic, grupo de variáveis "prontus"):
#   PRONTUS_KEYSTORE_B64      base64 do keystore .jks (o MESMO do EAS, p/ a Play aceitar)
#   PRONTUS_KEYSTORE_PASSWORD senha do keystore
#   PRONTUS_KEY_ALIAS         alias da chave
#   PRONTUS_KEY_PASSWORD      senha da chave
#
# O AAB sai assinado com a mesma chave dos v1/v2 → Play aceita como atualizacao.

workflows:
  sdx-prontus-android:
    name: SDX-Prontus — Android AAB (producao)
    instance_type: linux_x2
    max_build_duration: 60
    environment:
      node: 20.18.0
      groups:
        - prontus
      vars:
        # Bakeado no bundle JS durante o gradle bundleRelease (backend de producao):
        EXPO_PUBLIC_SDX_API_URL: "https://app.scandexplus.com.br"
        EXPO_PUBLIC_APP_ENV: "production"
    scripts:
      - name: Instalar dependencias
        script: npm ci
      - name: Expo prebuild (android)
        script: npx expo prebuild --platform android --no-install
      - name: Decodificar keystore
        script: |
          echo "$PRONTUS_KEYSTORE_B64" | base64 --decode > "$CM_BUILD_DIR/prontus.jks"
      - name: Build AAB assinado
        script: |
          cd android
          ./gradlew bundleRelease \
            -Pandroid.injected.signing.store.file="$CM_BUILD_DIR/prontus.jks" \
            -Pandroid.injected.signing.store.password="$PRONTUS_KEYSTORE_PASSWORD" \
            -Pandroid.injected.signing.key.alias="$PRONTUS_KEY_ALIAS" \
            -Pandroid.injected.signing.key.password="$PRONTUS_KEY_PASSWORD"
    artifacts:
      - android/app/build/outputs/bundle/release/*.aab
    publishing:
      email:
        recipients:
          - silvaoliveiraj@gmail.com
        notify:
          success: true
          failure: true
