# Codemagic — build do AAB do SDX-Prontus (Expo managed) sem usar a cota do EAS.
# Faz: npm ci → expo prebuild (gera android/) → gradle bundleRelease assinado.
#
# Pré-requisito (UI do Codemagic → Code signing identities → Android keystores):
#   Suba o keystore @sdx-joao__prontus-sdx.jks com reference name "prontus_keystore"
#   (o MESMO keystore do EAS, p/ a Play aceitar como atualizacao dos v1/v2).
#   Codemagic injeta automaticamente: CM_KEYSTORE_PATH, CM_KEYSTORE_PASSWORD,
#   CM_KEY_ALIAS, CM_KEY_PASSWORD.

workflows:
  sdx-prontus-android:
    name: SDX-Prontus — Android AAB (producao)
    instance_type: linux_x2
    max_build_duration: 60
    environment:
      node: 20.18.0
      android_signing:
        - prontus_keystore
      vars:
        # Bakeado no bundle JS durante o gradle bundleRelease (backend de producao):
        EXPO_PUBLIC_SDX_API_URL: "https://app.scandexplus.com.br"
        EXPO_PUBLIC_APP_ENV: "production"
    scripts:
      - name: Instalar dependencias
        script: npm ci
      - name: Expo prebuild (android)
        script: npx expo prebuild --platform android --no-install
      - name: Build AAB assinado
        script: |
          cd android
          ./gradlew bundleRelease \
            -Pandroid.injected.signing.store.file="$CM_KEYSTORE_PATH" \
            -Pandroid.injected.signing.store.password="$CM_KEYSTORE_PASSWORD" \
            -Pandroid.injected.signing.key.alias="$CM_KEY_ALIAS" \
            -Pandroid.injected.signing.key.password="$CM_KEY_PASSWORD"
    artifacts:
      - android/app/build/outputs/bundle/release/*.aab
    publishing:
      email:
        recipients:
          - silvaoliveiraj@gmail.com
        notify:
          success: true
          failure: true
